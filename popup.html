<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body { width: 220px; font-family: sans-serif; padding: 10px; }
            input { width: 100%; box-sizing: border-box; padding: 6px; font-size: 14px; }
            button { width: 100%; margin-top: 8px; padding: 6px; cursor: pointer; }
        </style>
    </head>
    <body>
        <input id="wid" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="Work item ID" autofocus>
        <button id="go">Go to ID</button>
        <script src="popup.js"></script>
    </body>
</html>
